<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Sayangku</title>
    <style>
        body {
            margin: 0; background-color: #ffebee;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: sans-serif; overflow: hidden;
        }
        .card {
            background: white; padding: 30px; border-radius: 25px;
            text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 80%; max-width: 300px;
        }
        .photo-circle {
            width: 180px; height: 180px; margin: 0 auto 20px;
            border: 5px solid #ffc107; /* Warna emas */
            border-radius: 50%; overflow: hidden;
            box-shadow: 0 0 15px rgba(233, 30, 99, 0.3);
        }
        .photo-circle img {
            width: 100%; height: 100%; object-fit: cover;
        }
        h1 { color: #d81b60; font-size: 1.2rem; margin: 15px 0; }
        .hearts { font-size: 25px; animation: pulse 0.8s infinite alternate; }
        @keyframes pulse { to { transform: scale(1.2); } }
        .rain { position: absolute; top: -10%; animation: fall linear forwards; }
        @keyframes fall { to { transform: translateY(110vh); } }
    </style>
</head>
<body>
    <div class="card">
        <div class="photo-circle">
            <img src="FOTO.JPG">
        </div>
        <div class="hearts">❤️💖❤️</div>
        <h1>aku sayang banget sama kamu sayang</h1>
        <p style="color: #888; font-size: 0.8rem;">Selamanya dan seterusnya ✨</p>
    </div>
    <script>
        setInterval(() => {
            const h = document.createElement('div');
            h.classList.add('rain'); h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }, 400);
    </script>
</body>
</html>
