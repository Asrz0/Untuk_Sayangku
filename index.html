<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Sayangku</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffebee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            z-index: 2;
            width: 85%;
            max-width: 350px;
        }

        /* Bingkai Foto Bentuk Love */
        .heart-frame {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            background-color: #e91e63;
            /* Memotong gambar jadi bentuk hati */
            clip-path: path('M75 145c-45-38-65-58-65-90 0-25 18-43 43-43 15 0 28 8 35 21 7-13 21-21 35-21 25 0 43 18 43 43 0 32-20 52-65 90z');
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .heart-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            color: #d81b60;
            font-size: 1.3rem;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .heart-main {
            color: #e91e63;
            font-size: 40px;
            animation: beat 0.8s infinite alternate;
        }

        @keyframes beat {
            to { transform: scale(1.2); }
        }

        .heart-drop {
            position: absolute;
            top: -10%;
            z-index: 1;
            user-select: none;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart-frame">
            <img src="foto.jpg" alt="Foto Sayang">
        </div>
        
        <div class="heart-main">❤️</div>
        <h1>aku sayang banget sama kamu sayang</h1>
        <p style="color: #888; font-size: 0.8rem;">Selamanya dan seterusnya ✨</p>
    </div>

    <script>
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-drop');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            const size = Math.random() * 20 + 10 + 'px';
            heart.style.fontSize = size;
            const duration = Math.random() * 3 + 2 + 's';
            heart.style.animationDuration = duration;
            heart.style.opacity = Math.random() * 0.5 + 0.5;
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
        setInterval(createHeart, 300);
    </script>
</body>
</html>
