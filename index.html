<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Sayangku</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #ffebee;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 85%;
            max-width: 320px;
            z-index: 10;
        }

        /* Area Foto */
        .heart-box {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* FOTO KAMU - Tidak akan kepotong karena pakai 'contain' */
        .main-photo {
            width: 70%; /* Ukuran diperkecil agar pas di tengah hati */
            height: 70%;
            object-fit: contain; 
            z-index: 1;
        }

        /* BINGKAI HATI - Ini yang membungkus foto */
        .heart-outline {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #e91e63;
            /* Membuat lubang berbentuk hati */
            mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>');
            -webkit-mask-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>');
            mask-size: 100%;
            -webkit-mask-size: 100%;
            mask-repeat: no-repeat;
            -webkit-mask-repeat: no-repeat;
            z-index: 2;
            pointer-events: none;
        }

        /* Border tambahan agar bentuk hati lebih tegas */
        .heart-box::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: none;
            border: 5px solid #e91e63;
            clip-path: path('M125 210c-60-55-115-100-115-150 0-45 35-80 80-80 25 0 48 15 55 35 7-20 30-35 55-35 45 0 80 35 80 80 0 50-55 95-115 150z');
            z-index: 3;
        }

        h1 {
            color: #d81b60;
            font-size: 1.1rem;
            margin-top: 10px;
        }

        .beat {
            animation: pulse 0.8s infinite alternate;
            display: inline-block;
            font-size: 30px;
        }

        @keyframes pulse { to { transform: scale(1.2); } }

        .falling {
            position: absolute;
            top: -10%;
            z-index: 1;
            animation: move linear forwards;
        }

        @keyframes move { to { transform: translateY(110vh); } }
    </style>
</head>
<body>

    <div class="container">
        <div class="heart-box">
            <img src="FOTO.JPG" class="main-photo" alt="Foto">
            <div class="heart-outline"></div>
        </div>
        
        <div class="beat">❤️</div>
        <h1>aku sayang banget sama kamu sayang</h1>
        <p style="color: #999; font-size: 0.8rem;">Selamanya dan seterusnya ✨</p>
    </div>

    <script>
        function create() {
            const h = document.createElement('div');
            h.classList.add('falling');
            h.innerHTML = '❤️';
            h.style.left = Math.random() * 100 + 'vw';
            h.style.fontSize = Math.random() * 20 + 10 + 'px';
            h.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(h);
            setTimeout(() => h.remove(), 5000);
        }
        setInterval(create, 300);
    </script>
</body>
</html>
